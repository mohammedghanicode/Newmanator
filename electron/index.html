<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newmanator // Console</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&display=swap");

      :root {
        --bg: #000000;
        --surface: #0a0a0a;
        --border: #1a1a1a;
        --accent: #f59e0b; /* Amber */
        --success: #10b981;
        --error: #ef4444;
        --text: #a1a1aa;
        --text-bright: #ffffff;
      }

      * {
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        height: 100vh;
        width: 100vw;
        display: flex;
        overflow: hidden;
      }

      /* --- Sidebar Layout --- */
      .sidebar {
        width: 380px;
        min-width: 380px;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 30px;
        background: var(--surface);
        height: 100%;
      }

      header {
        margin-bottom: 30px;
        flex-shrink: 0;
      }

      h1 {
        font-size: 1.2rem;
        font-weight: 800;
        color: var(--accent);
        margin: 0;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .subtitle {
        font-size: 0.7rem;
        color: var(--text-bright);
        margin-top: 5px;
        text-transform: uppercase;
      }

      .session-tag {
        font-size: 0.7rem;
        background: rgba(245, 158, 11, 0.05);
        color: var(--accent);
        padding: 6px 8px;
        border: 1px solid var(--border);
        margin-top: 12px;
        display: block;
      }

      /* --- Drop Zone & File List --- */
      .control-group {
        margin-bottom: 25px;
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex-grow: 1;
      }

      label {
        display: block;
        font-size: 0.75rem;
        text-transform: uppercase;
        margin-bottom: 12px;
        color: var(--text-bright);
        letter-spacing: 1px;
      }

      .drop-zone {
        border: 1px dashed var(--border);
        background: var(--bg);
        padding: 30px 15px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 15px;
      }

      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: var(--accent);
        background: rgba(245, 158, 11, 0.02);
      }

      .drop-zone.has-files {
        border-color: var(--success);
      }

      #fileInput {
        display: block;
        margin: 0 auto 15px auto;
        color: var(--text);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        cursor: pointer;
      }

      #fileInput::-webkit-file-upload-button {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 16px;
        cursor: pointer;
      }

      #fileInput:hover::-webkit-file-upload-button {
        background: rgba(245, 158, 11, 0.15);
      }

      #fileList {
        flex-grow: 1;
        overflow-y: auto;
        border: 1px solid var(--border);
        background: #050505;
        padding: 10px;
      }

      .file-item {
        font-size: 0.7rem;
        padding: 8px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .file-name {
        color: var(--text-bright);
      }

      /* --- Action Buttons --- */
      .btn-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: auto;
      }

      button {
        width: 100%;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
        padding: 12px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        cursor: pointer;
        text-transform: uppercase;
        font-weight: 600;
        transition: all 0.2s;
      }

      button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--text-bright);
      }

      #uploadBtn {
        background: var(--accent);
        color: #000;
        border: none;
        font-weight: 800;
      }

      #clearBtn {
        color: var(--error);
        border-color: rgba(239, 68, 68, 0.2);
      }

      button:disabled {
        opacity: 0.2;
        cursor: not-allowed;
      }

      /* --- Main Dashboard Area --- */
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 30px;
        height: 100%;
        min-width: 0;
      }

      /* Progress Bar Overhaul */
      .progress-section {
        margin-bottom: 20px;
      }

      .progress-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        margin-bottom: 10px;
      }

      .progress-rail {
        height: 4px;
        background: var(--border);
        width: 100%;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: var(--accent);
        transition: width 0.3s ease;
      }

      /* Result Frame */
      .result-preview {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .result-header {
        background: var(--border);
        padding: 8px 16px;
        font-size: 0.7rem;
        color: var(--text-bright);
        text-transform: uppercase;
      }

      iframe {
        flex: 1;
        width: 100%;
        border: none;
        background: white; /* Reports usually need white background to be readable */
      }

      /* Logs Panel */
      #logsCard {
        height: 200px;
        margin-top: 20px;
        background: var(--surface);
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }

      #logsPanel {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        font-size: 0.75rem;
        color: var(--success);
        line-height: 1.5;
      }

      .status-message {
        font-size: 0.75rem;
        padding: 8px;
        margin-bottom: 10px;
        border-left: 3px solid var(--accent);
        background: rgba(245, 158, 11, 0.05);
      }

      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <header>
        <h1>Newmanator</h1>
        <div class="subtitle">Report Collation Engine</div>
        <div class="session-tag">
          Queued reports: <span id="sessionIdDisplay">None</span>
        </div>
      </header>

      <div class="control-group">
        <label>REPORT_SELECTION</label>
        <div id="dropZone" class="drop-zone">
          <div style="font-size: 24px; margin-bottom: 10px">📂</div>
          <div style="font-size: 0.7rem">DROP .ZIP / .HTML</div>
        </div>
        <input type="file" id="fileInput" multiple accept=".zip,.html" />

        <label>SELECTED_REPORTS</label>
        <div id="fileList">Awaiting files...</div>
      </div>

      <div class="btn-group">
        <button id="uploadBtn" disabled>Process_Reports</button>
        <button id="clearBtn" disabled>Clear_Files</button>
      </div>
    </aside>

    <main class="main-content">
      <section id="progressSection" class="progress-section">
        <div class="progress-meta">
          <span id="statusMessage">SYSTEM_READY</span>
          <span id="progressBarLabel" style="color: var(--accent)">0%</span>
        </div>
        <div class="progress-rail">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <section id="resultPreview" class="result-preview">
        <div class="result-header">Summary Preview</div>
        <iframe id="resultFrame" src="about:blank"></iframe>
      </section>

      <section id="downloadSection" style="display: none; margin-top: 15px">
        <button
          id="downloadBtn"
          style="background: var(--success); color: #000; border: none"
        >
          OPEN_SUMMARY_REPORT
        </button>
      </section>

      <section id="logsCard">
        <div class="result-header">terminal_logs</div>
        <div id="logsPanel">Waiting for process start...</div>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
